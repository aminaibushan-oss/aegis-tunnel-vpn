<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Tunnel VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #121824;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Top Bar Header */
        .top-bar {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            margin-bottom: 20px;
        }

        .menu-icon, .notif-icon {
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
            padding: 5px;
        }

        .app-title-area {
            text-align: center;
        }

        .app-title-area h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .app-title-area span {
            font-size: 11px;
            color: #64748b;
        }

        /* Sidebar Navigation Drawer */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #1e293b;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            z-index: 100;
            transition: 0.3s ease;
            padding: 20px 15px;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 14px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .sidebar-menu-item:hover {
            background-color: #334155;
        }

        .sidebar-menu-item .icon {
            margin-right: 15px;
            font-size: 18px;
            width: 20px;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Logo Area */
        .logo-box {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background-color: #1e293b;
            border: 2px solid #0284c7;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(2, 132, 199, 0.2);
            overflow: hidden;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-placeholder {
            font-size: 35px;
        }

        /* Center Big Power Button */
        .power-container {
            margin: 20px 0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .outer-ring {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 4px solid #ef4444;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            transition: 0.4s ease;
            background-color: #151f32;
        }

        .power-button {
            width: 135px;
            height: 135px;
            border-radius: 50%;
            background-color: #1e293b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .power-svg {
            width: 45px;
            height: 45px;
            fill: #ef4444;
            transition: 0.4s ease;
        }

        .state-text {
            margin-top: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ef4444;
        }

        /* Connected Styling States */
        .outer-ring.connected {
            border-color: #10b981;
            box-shadow: 0 0 35px rgba(16, 185, 129, 0.5);
        }
        .outer-ring.connected .power-svg {
            fill: #10b981;
        }
        .outer-ring.connected .state-text {
            color: #10b981;
        }

        /* Bandwidth Speed Counters */
        .speed-panel {
            display: flex;
            width: 100%;
            max-width: 380px;
            background-color: #1c2536;
            border-radius: 12px;
            padding: 12px;
            margin: 25px 0;
            border: 1px solid #2d3748;
        }

        .speed-block {
            flex: 1;
            text-align: center;
        }

        .speed-block span {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .speed-block p {
            font-size: 14px;
            font-weight: 600;
            color: #38bdf8;
        }

        /* Selector Container Styles */
        .selector-card {
            width: 100%;
            max-width: 380px;
            background-color: #1c2536;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #2d3748;
            display: flex;
            align-items: center;
        }

        .selector-icon {
            font-size: 20px;
            margin-right: 15px;
            color: #38bdf8;
        }

        .selector-content {
            flex: 1;
        }

        .selector-content label {
            display: block;
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .selector-content select {
            width: 100%;
            background: transparent;
            color: #ffffff;
            border: none;
            outline: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .selector-content select option {
            background-color: #1c2536;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Sidebar Overlay & Menu Drawer -->
    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Aegis Settings</h3>
            <p style="font-size:11px; color:#64748b;">Version 1.0.0 (Build)</p>
        </div>
        <div class="sidebar-menu-item"><span class="icon">☀️</span> App Theme</div>
        <div class="sidebar-menu-item"><span class="icon">⚙️</span> App Settings</div>
        <div class="sidebar-menu-item"><span class="icon">🚀</span> V2ray Settings</div>
        <div class="sidebar-menu-item"><span class="icon">🔍</span> Host Checker</div>
        <div class="sidebar-menu-item"><span class="icon">✈️</span> Telegram Group</div>
        <div class="sidebar-menu-item"><span class="icon">🗑️</span> Clear App Data</div>
    </div>

    <!-- Top Navigation Bar -->
    <div class="top-bar">
        <div class="menu-icon" onclick="toggleMenu()">&equiv;</div>
        <div class="app-title-area">
            <h1>AEGIS TUNNEL</h1>
            <span>NoobDEV (Build)</span>
        </div>
        <div class="notif-icon">&DoubleCap;</div>
    </div>

    <!-- App Logo Area -->
    <div class="logo-box">
        <!-- Zaka iya sanya ainihin link din logonku a wurin src na kasa idan ka dora shi a kusa -->
        <div class="logo-placeholder" id="logoDisplay">🛡️</div>
    </div>

    <!-- Connection Power Switch -->
    <div class="power-container">
        <div class="outer-ring" id="ring">
            <div class="power-button" onclick="handleConnect()">
                <svg class="power-svg" viewBox="0 0 24 24">
                    <path d="M12,3A1,1 0 0,0 11,4V12A1,1 0 0,0 12,13A1,1 0 0,0 13,12V4A1,1 0 0,0 12,3M16.56,5.44A1,1 0 0,0 15.15,6.85C17.43,9.13 17.43,12.87 15.15,15.15C12.87,17.43 9.13,17.43 6.85,15.15C4.57,12.87 4.57,9.13 6.85,6.85A1,1 0 0,0 5.44,5.44C2.36,8.53 2.36,13.53 5.44,16.61C8.53,19.7 13.53,19.7 16.61,16.61C19.7,13.53 19.7,8.53 16.61,5.44Z" />
                </svg>
                <div class="state-text" id="stateLabel">Stopped</div>
            </div>
        </div>
    </div>

    <!-- Speed Counter Panel -->
    <div class="speed-panel">
        <div class="speed-block">
            <span>Download</span>
            <p id="down">0.00 B/s</p>
        </div>
        <div style="width:1px; background-color:#2d3748; margin:0 10px;"></div>
        <div class="speed-block">
            <span>Upload</span>
            <p id="up">0.00 B/s</p>
        </div>
    </div>

    <!-- Server Selector Card -->
    <div class="selector-card">
        <div class="selector-icon">🌐</div>
        <div class="selector-content">
            <label>Server Location</label>
            <select id="server">
                <option value="auto">Nigeria (Auto Server)</option>
                <option value="us">United States (Premium)</option>
                <option value="uk">United Kingdom (Gaming)</option>
                <option value="ca">Canada (Ultra Speed)</option>
            </select>
        </div>
    </div>

    <!-- Network Tweak/Channel Selector Card -->
    <div class="selector-card">
        <div class="selector-icon">⚡</div>
        <div class="selector-content">
            <label>Network Tweaks / Channels</label>
            <select id="tweak">
                <option value="mtn1">NIGERIA | MTN 1GB DAILY (Working)</option>
                <option value="mtn700">NIGERIA | MTN 700MB Promo</option>
                <option value="mtnunl1">NIGERIA | MTN UNLIMITED 1</option>
                <option value="mtnunl2">NIGERIA | MTN UNLIMITED 2</option>
                <option value="glo">NG | GLO UNLIMITED DNS (0 Credit)</option>
                <option value="airtel">NIGERIA | AIRTEL 300MB Working</option>
            </select>
        </div>
    </div>

    <script>
        let running = false;
        let timer = null;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function handleConnect() {
            const ring = document.getElementById('ring');
            const label = document.getElementById('stateLabel');
            const downText = document.getElementById('down');
            const upText = document.getElementById('up');

            running = !running;

            if (running) {
                ring.classList.add('connected');
                label.innerText = "Running";
                
                timer = setInterval(() => {
                    downText.innerText = (Math.random() * (25 - 2) + 2).toFixed(2) + " MB/s";
                    upText.innerText = (Math.random() * (8 - 1) + 1).toFixed(2) + " MB/s";
                }, 1200);
            } else {
                ring.classList.remove('connected');
                label.innerText = "Stopped";
                clearInterval(timer);
                downText.innerText = "0.00 B/s";
                upText.innerText = "0.00 B/s";
            }
        }
    </script>
</body>
</html>
